name: Basic build for pull request

on:
  pull_request:
    branches: ["main"]

jobs:
  build-linux:
    defaults:
      run:
        shell: bash
   
    name: • ubuntu-22.04 • g++ •
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
         echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Patch TBB submodule
        run: patch -p0 -f -i patches/tbb.patch
  
      - name: Configure cmake
        env:
          CXX: g++
          CC: gcc
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=Release \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DBUILTIN_TBB=ON \
                -S ${{ github.workspace }}

      - name: Build
        run: |
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config Release
      
      - name: Packaging
        run: |
          cd build
          cpack

  build-mac:
    defaults:
      run:
        shell: bash
    
    name: • macos-latest • clang++ •
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Patch TBB submodule
        run: patch -p0 -f -i patches/tbb.patch
  
      - name: Configure cmake
        env:
          CXX: clang++
          CC: clang
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=Release \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DBUILTIN_TBB=ON \
                -S ${{ github.workspace }}

      - name: Build
        run: |
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config Release

      - name: Packaging
        run: |
          cd build
          cpack
  
  build_python:
    defaults:
      run:
        shell: bash
    
    strategy:
      fail-fast: false
      matrix:
        buildplat:
          - [ubuntu-24.04, manylinux_x86_64]
          - [macos-14, macosx_arm64]
        python: ["cp312"]
    
    env:
      name: lzcomplexity-${{ matrix.python }}-${{ matrix.buildplat[0] }}-${{ matrix.buildplat[1] }}

    name: • ${{ matrix.buildplat[0] }}-${{ matrix.buildplat[1] }} • ${{ matrix.python }} •
    runs-on: ${{ matrix.buildplat[0] }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Setup macOS
        if: matrix.buildplat[0] == 'macos-13' || matrix.buildplat[0] == 'macos-14'
        run: |
         CIBW="RUNNER_OS=macOS MACOSX_DEPLOYMENT_TARGET=12.0"
         echo "CIBW_ENVIRONMENT_MACOS=$CIBW" >> "$GITHUB_ENV"  

      - name: Install cibuildwheel and twine
        run: python -m pip install cibuildwheel==2.21.1 twine

      - name: Generate wheel
        run: |
          python -m cibuildwheel --output-dir wheelhouse
          ls -al ./wheelhouse/
        env:
          CIBW_PRERELEASE_PYTHONS: True
          CIBW_FREE_THREADED_SUPPORT: True
          CIBW_BUILD: ${{ matrix.python }}-${{ matrix.buildplat[1] }}

      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ env.name }}
      #     path: ./wheelhouse/*.whl
     
      # - name: Upload distribution to PyPI
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: twine upload ./wheelhouse/*