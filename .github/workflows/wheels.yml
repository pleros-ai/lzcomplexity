name: Build and publish Python wheels

on:
  push:
    # branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_python:
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        buildplat:
          - [ubuntu-22.04, manylinux_x86_64, ""]
          # - [ubuntu-24.04, manylinux_x86_64]
          - [ubuntu-22.04, musllinux_x86_64, ""]
          # - [ubuntu-24.04, musllinux_x86_64]
          # - [ubuntu-22.04-arm, manylinux_aarch64]
          - [macos-13, macosx_x86_64, accelerate]
          - [macos-14, macosx_arm64, accelerate]
        python:
          - ["cp39", "3.9"]
          - ["cp310", "3.10"]
          - ["cp311", "3.11"]
          - ["cp312", "3.12"]

    env:
      name: lzcomplexity-${{ matrix.python }}-${{ matrix.buildplat[0] }}-${{ matrix.buildplat[1] }}

    name: • ${{ matrix.buildplat[0] }}-${{ matrix.buildplat[1] }} • ${{ matrix.python[0] }} •
    runs-on: ${{ matrix.buildplat[0] }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Setup python version
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      # - name: Install build dependencies
      #   run: python -m pip install -U pip setuptools wheel build twine

      # - name: Build sdist
      #   run: |
      #     python setup.py sdist
      #     echo "SDIST_FILE=$(basename $(find dist -name '*.tar.gz'))" >> $GITHUB_ENV

      - name: Generate wheel
        uses: pypa/cibuildwheel@v2.23.2
        with:
          package-dir: .
          output-dir: wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}
          # CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_ALL: "pip install scikit-build-core"
          CIBW_AFTER_BUILD: twine check {wheel}
          CIBW_CMAKE_ARGS: >
            -DPython_EXECUTABLE={python} 
            -DPython_INCLUDE_DIR={python_include} 
            -DPython_LIBRARY={python_lib}
            -DLZ_ONLY_CORE=ON 
            -DBUILD_PYTHON=ON 
            -DFIXED_PYTHON=ON 
            -DFIXED_VERSION=${{ matrix.python[1] }}
          CMAKE_ARGS: "-DLZ_ONLY_CORE=ON -DBUILD_PYTHON=ON -DFIXED_PYTHON=ON -DFIXED_VERSION=${{ matrix.python[1] }}"

      # - name: Install cibuildwheel and twine
      #   run: python -m pip install cibuildwheel==2.21.1 twine

      # - name: Generate wheel
      #   run: python -m cibuildwheel --output-dir wheelhouse
