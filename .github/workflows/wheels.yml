name: Build and publish Python wheels

on:
  push:
    # branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'deploy wheels'
        type: boolean
        default: false

jobs:
  build_python:
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        buildplat: [ubuntu-22.04, macos-14]

    env:
      name: lzcomplexity-${{ matrix.buildplat }}

    name: • ${{ matrix.buildplat }} •
    runs-on: ${{ matrix.buildplat }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Setup python version
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Generate wheel
        uses: pypa/cibuildwheel@v3.4.0
        with:
          package-dir: .
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ env.name }}
          path: ./wheelhouse/*.whl
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_DEBUG_TRACEBACK: "TRUE"
          CIBW_ENVIRONMENT_MACOS: "RUNNER_OS=macOS MACOSX_DEPLOYMENT_TARGET=14.0"

      - name: Upload distribution to PyPI
        if: ${{ (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || inputs.deploy }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          twine upload ./wheelhouse/*

