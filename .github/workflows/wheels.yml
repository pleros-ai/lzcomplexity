      #     CIBW_PRERELEASE_PYTHONS: True
      #     CIBW_FREE_THREADED_SUPPORT: True
      #     CIBW_BUILD: ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}-${{ matrix.buildplat[2] }}
      #     CIBW_AFTER_BUILD: twine check {wheel}

      # - name: Generate wheel
      #   run: |
      #     python -m pip wheel . --wheel-dir ./dist -v
      #     for wheel in ./dist/*.whl; do
      #       twine check "$wheel"
      #     done

      # - name: Fix macOS wheel ARM
      #   if: matrix.buildplat[1] == 'macosx_arm64'
      #   run: |
      #     python -m pip install --upgrade delocate
      #     for wheel in ./dist/*.whl; do
      #       delocate-wheel --require-archs arm64 -w ./wheelhouse -v "$wheel"
      #     done

      # - name: Fix macOS wheel x86_64
      #   if: matrix.buildplat[1] == 'macosx_x86_64'
      #   run: |
      #     python -m pip install --upgrade delocate
      #     for wheel in ./dist/*.whl; do
      #       delocate-wheel --require-archs x86_64 -w ./wheelhouse -v "$wheel"
      #     done

      # - name: Fix Linux wheel
      #   if: matrix.buildplat[1] == 'manylinux_x86_64' || matrix.buildplat[1] == 'musllinux_x86_64'
      #   run: |
      #     python -m pip install auditwheel
      #     for wheel in ./dist/*.whl; do
      #       auditwheel repair --plat manylinux2014_x86_64 -w ./wheelhouse "$wheel"
      #     done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.name }}
          path: ./wheelhouse/*.whl

      - name: Upload distribution to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload ./wheelhouse/*

