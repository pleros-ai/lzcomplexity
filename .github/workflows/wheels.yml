name: Build and publish Python wheels

on:
  push:
    # branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'deploy wheels'
        type: boolean
        default: false

jobs:
  build_wheels:
    name: • ${{ matrix.os }} • ${{ matrix.arch }} •
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────
          - os: ubuntu-22.04
            arch: x86_64
            cibw_build: "cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64 cp314-manylinux_x86_64"

          # ── macOS arm64 (Apple Silicon) ───────────────────────────────
          - os: macos-14
            arch: arm64
            cibw_build: "cp39-macosx_arm64 cp310-macosx_arm64 cp311-macosx_arm64 cp312-macosx_arm64 cp313-macosx_arm64 cp314-macosx_arm64"
            deployment_target: "14.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # v5 does not exist yet
        with:
          submodules: recursive

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      # ── macOS: install OpenMP and LLVM clang ──────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install libomp llvm
          echo "OpenMP_ROOT=$(brew --prefix libomp)"   >> $GITHUB_ENV
          echo "LLVM_PREFIX=$(brew --prefix llvm)"     >> $GITHUB_ENV
          echo "LIBOMP_LIB=$(brew --prefix libomp)/lib" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5      # v6 does not exist yet
        with:
          python-version: 3.x

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0  # pin for reproducibility

      # ── Build wheels ──────────────────────────────────────────────────
      - name: Build wheels (${{ matrix.arch }})
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD_VERBOSITY: 1

          # ── All platforms ──────────────────────────────────────────────
          CIBW_BEFORE_BUILD: pip install ninja cmake

          # ── Linux ─────────────────────────────────────────────────────
          CIBW_BEFORE_BUILD_LINUX: |
            yum install -y libgomp || apt-get install -y libgomp1 || true
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_POSITION_INDEPENDENT_CODE=ON

          # ── macOS ─────────────────────────────────────────────────────
          # $(brew --prefix) expands at runtime in the shell — works correctly here
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }}
            CMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
            OpenMP_ROOT=${{ env.OpenMP_ROOT }}
            CC=${{ env.LLVM_PREFIX }}/bin/clang
            CXX=${{ env.LLVM_PREFIX }}/bin/clang++
            LDFLAGS="-L${{ env.LIBOMP_LIB }}"
            CPPFLAGS="-I${{ env.OpenMP_ROOT }}/include"
            CMAKE_POSITION_INDEPENDENT_CODE=ON

          # delocate needs to know where libomp lives to bundle it into the wheel
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH=${{ env.LIBOMP_LIB }}
            delocate-wheel --require-archs ${{ matrix.arch }}
            -w {dest_dir} -v {wheel}

          # ── Windows ───────────────────────────────────────────────────
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_POSITION_INDEPENDENT_CODE=ON

          # ── Skip what you don't support ────────────────────────────────
          CIBW_SKIP: "pp* *-win32 *-musllinux* *-manylinux_i686"

      # ── Upload per-matrix artifact ────────────────────────────────────
      - name: Upload wheels
        uses: actions/upload-artifact@v4   # v6 does not exist yet
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error        # fail loudly if build produced nothing

  # ── Collect all wheels and publish ────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-22.04

    # Only publish on a version tag push, or manual deploy trigger
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)

    permissions:
      id-token: write   # required for trusted publishing (no token needed)

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*              # pulls every matrix artifact
          merge-multiple: true           # flattens into one directory
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_API_TOKEN secret needed.
        # Configure trusted publisher at: https://pypi.org/manage/project/lzcomplexity/settings/publishing/