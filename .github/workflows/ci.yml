name: CI

on:
  push:
    branches: ["main", "rust"]
  pull_request:

jobs:
  rust-tests:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - run: cargo test --workspace --release

  python-wheel:
    name: Python wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: maturin build --release --interpreter python3 --out dist
      - name: Smoke-test import
        # --no-index keeps pip away from PyPI (where the older C++ build of
        # `lzcomplexity` lives) so the locally-built wheel is the only candidate.
        run: |
          pip install --no-index --find-links dist --force-reinstall lzcomplexity
          python -c "import lzcomplexity as lz; print(lz.__version__); print(lz.factorization('01010101'))"
