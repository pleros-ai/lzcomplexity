      - name: Deploy to brew
        run: |
          ls -al


  build-rpm:
    defaults:
      run:
        shell: bash
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • RPM • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v5
