# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms for lzcomplexity library

on:
  push:
    # branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            platform: ubuntu_24.04
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON
          - runs-on: ubuntu-22.04
            platform: ubuntu_22.04
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • ${{ matrix.runs-on }} • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Install TBB
        if: matrix.builtinTbb == 'OFF'
        run: |
          sudo apt-get update
          sudo apt-get -q install libtbb-dev

      - name: Install LLVM and Clang
        if: matrix.cxx == 'clang++'
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "17.0"

      # Ubuntu image have problems with clang and stdlib++, so we need to install a newer version
      # - name: Install newer Clang
      #   if: matrix.cxx == 'clang++'
      #   run: |
      #     wget https://apt.llvm.org/llvm.sh
      #     chmod +x ./llvm.sh
      #     sudo ./llvm.sh 17

      - name: Patch TBB submodule
        run: patch -p0 -f -i patches/tbb.patch

      - name: Configure cmake
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DLZ_DISTANCE=OFF -DLZ_PARALLEL_BACKEND=TBB -DBUILTIN_TBB=${{matrix.builtinTbb}} \
                -S ${{ github.workspace }}

      - name: Build
        run: |
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config ${{ matrix.build_type }}
      
      - name: Packaging
        run: |
          cd build
          cpack

      - uses: actions/upload-artifact@v4
        with:
          name: lzcomplexity-${{matrix.runs-on}}-${{matrix.cxx}}-package
          path: ./_packages
          retention-days: 1

  deploy-launchpad:
    defaults:
      run:
        shell: bash
    needs: build-linux
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-24.04
            platform: ubuntu_24.04
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON
          - runs-on: ubuntu-22.04
            platform: ubuntu_22.04
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • Deploy PPA • ${{ matrix.runs-on }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Install tools fof upload to PPA
        run: sudo apt-get install -y ssh gnupg dput devscripts debhelper

      # Decode SSH private key
      - name: Decode SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "$LAUNCHPAD_SSH_PRIVATE_KEY and secret: ${{ secrets.LAUNCHPAD_SSH_PRIVATE_KEY }}"
          echo "${{ secrets.LAUNCHPAD_SSH_PRIVATE_KEY }}" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # Configure SSH
      - name: Configure SSH
        run: |
          ssh-keyscan launchpad.net >> ~/.ssh/known_hosts
          # ssh -o "StrictHostKeyChecking=no" -i ~/.ssh/id_ed25519 launchpad.net || true
          # Test SSH connection
          ssh -T git@git.launchpad.net || true  # This will fail but shows key works

      # Set up GPG key for signing
      - name: Set up GPG key
        run: |
          echo "${{ secrets.GPG_KEY_LANUCHPAD }}" | base64 --decode | gpg --import --batch
          echo "${{ secrets.GPG_KEY_PASSPHRASE }}" | gpg --passphrase-fd 0 --export-secret-key -a > /dev/null 2>&1 || true
          # Verify the key is imported
          gpg --list-secret-keys

      # Configure dput config file
      - name: Configure dput for PPA upload
        run: |
          cat > ~/.dput.cf << EOF
          [your-ppa]
          fqdn = ppa.launchpad.net
          method = sftp
          login = ${{ secrets.LAUNCHPAD_USERNAME }}
          incoming = ~${{ secrets.LAUNCHPAD_USERNAME }}/ubuntu/${{ secrets.LAUNCHPAD_PPA }}/
          EOF

      - name: Prepare Debian source package
        env:
          LAUNCHPAD_EMAIL: ${{ secrets.LAUNCHPAD_EMAIL }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          VERSION: 0.9.8
        run: |
          # Create directory structure for Debian source package
          mkdir -p ~/packaging/${{ github.event.repository.name }}-${VERSION}
          
          # Extract tarball
          TARBALL_NAME=$(basename ${{ github.workspace }}/_packages/*.tar.gz)
          tar -xzf ${TARBALL_NAME} -C ~/packaging/
          
          # If your project already has a debian directory, copy it
          if [ -d "debian" ]; then
            cp -r debian ~/packaging/${{ github.event.repository.name }}-${VERSION}/
          else
            # Create basic debian directory if it doesn't exist
            cd ~/packaging/${{ github.event.repository.name }}-${VERSION}
            dh_make -y --single --createorig -p ${{ github.event.repository.name }}_${VERSION} -e ${LAUNCHPAD_EMAIL}
            # Clean up unnecessary files
            rm -f debian/*.ex debian/*.EX debian/README.*
          fi
          
          # Update changelog
          cd ~/packaging/${{ github.event.repository.name }}-${VERSION}
          dch -v ${VERSION}-0ppa1~ubuntu20.04.1 -D focal -m "New upstream release" --force-distribution
          
          # Sign the package
          debuild -S -sa -k${GPG_KEY_ID}
          
          # Find the .changes file
          CHANGES_FILE=$(ls ~/packaging/*_source.changes | head -1)
          echo "CHANGES_FILE=${CHANGES_FILE}"
          echo "CHANGES_FILE=${CHANGES_FILE}" >> $GITHUB_ENV

      # Upload .deb package to Launchpad
      # - name: Upload to Launchpad
      #   if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      #   env:
      #     LAUNCHPAD_USERNAME: ${{ secrets.LAUNCHPAD_USERNAME }}
      #     LAUNCHPAD_EMAIL: ${{ secrets.LAUNCHPAD_EMAIL }}
      #     LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
      #     LAUNCHPAD_KEY: ${{ secrets.GPG_KEY_LANUCHPAD }}
      #     VERSION: 0.9.8
      #     DISTRO: $(lsb_release -cs)
      #   run: |
      #     # Extract the built package
      #     # mkdir -p ~/lzcomplexity_src
      #     # cd ~/lzcomplexity_src

      #     # Set up dput configuration
      #     echo "machine launchpad login ${LAUNCHPAD_USERNAME} ssh_options = -i ~/.ssh/id_ed25519" > ~/.dput.cf

      #     # Uncompress .deb package
      #     unzip ${{ github.workspace }}/_packages/lzcomplexity-${{ matrix.runs-on }}-${{ matrix.cxx }}-package.zip

      #     # Upload package
      #     dput ppa:${LAUNCHPAD_PPA} ${{ github.workspace }}/_packages/lzcomplexity_${VERSION}_${{ matrix.platform }}_x86_64.deb


  build-mac:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            build_type: "Release"
            cxx: clang++
            cc: clang
            builtinTbb: ON
            # - runs-on: macos-latest
            #   build_type: "Release"
            #   cxx: clang++
            #   cc: clang
            #   builtinTbb: OFF
          # - runs-on: macos-latest-large
          #   build_type: "Release"
          #   cxx: clang++
          #   cc: clang
          #   builtinTbb: ON
            
    name: • ${{ matrix.runs-on }} • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
      
      - name: Install TBB
        if: matrix.builtinTbb == 'OFF'
        run: |
          brew update
          brew install tbb

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Configure cmake
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DLZ_DISTANCE=OFF -DLZ_PARALLEL_BACKEND=TBB -DBUILTIN_TBB=${{matrix.builtinTbb}} \
                -S ${{ github.workspace }}

      - name: Build
        run: |
          cd build
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config ${{ matrix.build_type }}
      
      - name: Packaging
        run: |
          cd build
          cpack

      - uses: actions/upload-artifact@v4
        with:
          name: lzcomplexity-${{matrix.runs-on}}-${{matrix.cxx}}-package
          path: ${{ github.workspace }}/_packages
          retention-days: 1
      
      - name: Deploy to brew
        run: |
          ls -al


  build-rpm:
    defaults:
      run:
        shell: bash
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • RPM • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
         echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Configure cmake
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DLZ_DISTANCE=OFF -DLZ_PARALLEL_BACKEND=TBB -DBUILTIN_TBB=${{matrix.builtinTbb}} \
                -S ${{ github.workspace }}
  
      - name: Build
        run: |
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Generate RPM package using CPack
        run: |
          cd build
          cpack -G RPM

      - uses: actions/upload-artifact@v4
        with:
          name: lzcomplexity-redhat-${{matrix.cxx}}-package
          path: ${{ github.workspace }}/_packages
          retention-days: 1

