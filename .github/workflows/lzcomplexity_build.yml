# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms for lzcomplexity library

on:
  push:
    # branches: ["main"]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ubuntu:
        description: 'deploy ubuntu binary'
        type: boolean
        default: false
      mac:
        description: 'deploy mac binary'
        type: boolean
        default: false

env:
  VERSION: 0.9.15
  OLD_REVISION: 1
  REVISION: 1
  TAR_DISTRO: ubuntu22.04.1

permissions:
  contents: write  # Allows GITHUB_TOKEN to create Releases

jobs:
  build-linux:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            platform: ubuntu_24.04
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON
          - runs-on: ubuntu-22.04
            platform: ubuntu_22.04
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • ${{ matrix.runs-on }} • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Install TBB
        if: matrix.builtinTbb == 'OFF'
        run: |
          sudo apt-get update
          sudo apt-get -q install libtbb-dev

      - name: Install LLVM and Clang
        if: matrix.cxx == 'clang++'
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "17.0"

      # Ubuntu image have problems with clang and stdlib++, so we need to install a newer version
      # - name: Install newer Clang
      #   if: matrix.cxx == 'clang++'
      #   run: |
      #     wget https://apt.llvm.org/llvm.sh
      #     chmod +x ./llvm.sh
      #     sudo ./llvm.sh 17

      - name: Patch TBB submodule
        run: patch -p0 -f -i patches/tbb.patch

      - name: Configure cmake
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DLZ_DISTANCE=OFF -DLZ_PARALLEL_BACKEND=TBB -DBUILTIN_TBB=${{matrix.builtinTbb}} \
                -S ${{ github.workspace }}

      - name: Build
        run: |
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config ${{ matrix.build_type }} -j$(nproc)
      
      - name: Packaging
        run: |
          cd build
          cpack

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/_packages
          tag_name: 0.9.15
          name: Release 0.9.15
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: lzcomplexity-${{matrix.runs-on}}-${{matrix.cxx}}-package
          path: ./_packages
          retention-days: 1
      
      - name: Install package into staging dir
        run: |
          cmake --install build --prefix $PWD/stage
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: lzcomplexity-${{matrix.runs-on}}-${{matrix.cxx}}-build
          path: stage/
          retention-days: 1

  # Deploy debian package
  deploy-launchpad:
    if: ${{ (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || inputs.ubuntu }}
    defaults:
      run:
        shell: bash
    needs: build-linux
    strategy:
      max-parallel: 1
      matrix:
        include:
          - runs-on: ubuntu-22.04
            platform: ubuntu22.04
            distro: jammy
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON
          - runs-on: ubuntu-24.04
            platform: ubuntu24.04
            distro: noble
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • Deploy PPA • ${{ matrix.runs-on }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: lzcomplexity-${{matrix.runs-on}}-${{matrix.cxx}}-build
          path: ./build

      - name: Install basic dependeencies for upload to PPA
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gnupg dput devscripts debhelper cmake libtbb-dev equivs

      # - name: Install Build-Depends
      #   run: sudo mk-build-deps -i -r -t 'apt-get -y' debian/control

      # Set up GPG key for signing
      - name: Set up GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_KEY_LANUCHPAD }}
          GPG_KEY_PASSPHRASE: ${{ secrets.GPG_KEY_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          # Import GPG key with proper formatting
          # Save key to a file to preserve formatting
          echo "$GPG_PRIVATE_KEY" > private.key
          
          # Import both public and private parts
          gpg --import --batch --no-tty private.key
          rm -f private.key

          # echo "$GPG_KEY_PASSPHRASE" | gpg --passphrase-fd 0 --export-secret-key -a > /dev/null 2>&1 || true
          
          # Configure GPG for automated signing
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf

          # Restart GPG agent
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent
          sleep 2

          # Verify the key is imported
          gpg --list-secret-keys

          # Optional: if you need to trust the key
          # echo -e "5\ny\n" | gpg --command-fd 0 --expert --edit-key "$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5)" trust

          echo "test" | gpg --clearsign --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_KEY_PASSPHRASE" -u "$GPG_KEY_ID" -o /dev/null
          echo "✅ Signing test passed"

      - name: Configure git for Launchpad
        run: |
          git config --global user.name "Efren Aragon"
          git config --global user.email "${{ secrets.LAUNCHPAD_EMAIL }}"
          git config --global user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config --global commit.gpgsign true

      - name: Create the orig.tar.gz file
        run: |
          URL="https://launchpad.net/~pleros/+archive/ubuntu/lzcomplexity/+sourcefiles/lzcomplexity/${VERSION}-${OLD_REVISION}~${TAR_DISTRO}/lzcomplexity_${VERSION}.orig.tar.gz"
          
          if curl --output /dev/null --silent --head --fail "$URL"; then
            wget -q "$URL" -O ${{ github.workspace }}/lzcomplexity_${VERSION}.orig.tar.gz
            echo "Tarball descargado desde Launchpad."
            echo "SOURCE_FLAG=-sd" >> $GITHUB_ENV
            echo "PATCH_NEEDED=true" >> $GITHUB_ENV
          else
            echo "Tarball no encontrado en Launchpad (primera subida). Generando localmente..."
            mkdir -p /tmp/lzcomplexity-${VERSION}
            rsync -av --exclude='build/' --exclude='config/' --exclude='.git/' \
                  --exclude='python/' --exclude='*.tar.gz' --exclude='test_data/' \
                  --exclude='.github/' --exclude='.vscode/' --exclude='.windsurf/' \
                  --exclude='debian/' ${{ github.workspace }}/ /tmp/lzcomplexity-${VERSION}/
            tar --sort=name --mtime='2026-03-01 00:00Z' --owner=0 --group=0 --numeric-owner \
              -czf ${{ github.workspace }}/lzcomplexity_${VERSION}.orig.tar.gz -C /tmp/lzcomplexity-${VERSION} .
            rm -rf /tmp/lzcomplexity-${VERSION}
            echo "SOURCE_FLAG=-sa" >> $GITHUB_ENV
            echo "PATCH_NEEDED=false" >> $GITHUB_ENV
          fi
      
      - name: Prepare source tree
        run: |
          mkdir -p build_source
          cd build_source
          # Copy source again, excluding the same patterns
          rsync -av --exclude='build/' --exclude='config/' --exclude='.git/' \
                  --exclude='python/' --exclude='*.tar.gz' --exclude='test_data/' \
                  --exclude='.github/' --exclude='.vscode/' --exclude='.windsurf/' \
                  --exclude='debian/' ${{ github.workspace }}/ ./
          # Copy the debian/ folder from your config
          cp -r ${{ github.workspace }}/config/lzcomplexity_debian ./debian

      - name: Create parch file
        if: env.PATCH_NEEDED == 'true'
        run: |
          mkdir -p /tmp/lzcomplexity-orig
          echo "Decompress tar file in /tmp/lzcomplexity-orig"
          tar xf ${{ github.workspace }}/lzcomplexity_${VERSION}.orig.tar.gz -C /tmp/lzcomplexity-orig --strip-components=1
          
          echo "Build parch with diff command"
          diff -Nur /tmp/lzcomplexity-orig ${{ github.workspace }}/build_source --exclude=debian --exclude=.github > repo-parche.patch || true
          
          mkdir build_source/debian/patches
          mv repo-parche.patch build_source/debian/patches/
          echo "repo-parche.patch" >> build_source/debian/patches/series
          
          ls -al build_source/
          ls -al build_source/debian/
          ls -al build_source/debian/patches

      - name: Update changelogs
        env:
          DEBFULLNAME: Efren Aragon
          DEBEMAIL: ${{ secrets.LAUNCHPAD_EMAIL }}
        run: |
          cd build_source
          # 🔁 FIX: Change UNRELEASED to your target release (e.g., jammy)
          dch -b -v "${VERSION}-${REVISION}~${{matrix.platform}}.1" --distribution "${{matrix.distro}}" "Build for ${{matrix.distro}} for version ${VERSION}-${REVISION}"

      - name: Build unsigned package
        run: |
          cd build_source
          dpkg-buildpackage -S ${SOURCE_FLAG} -us -uc -d

      - name: Sign files with GPG
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_PASSPHRASE: ${{ secrets.GPG_KEY_PASSPHRASE }}
        run: |
          # Write passphrase to a secure temporary file
          echo "$GPG_KEY_PASSPHRASE" > /tmp/passphrase.txt
          chmod 600 /tmp/passphrase.txt

          # Sign both files and update .changes checksums
          debsign --re-sign \
            -p"gpg --batch --yes --pinentry-mode loopback --passphrase-file /tmp/passphrase.txt" \
            -k"$GPG_KEY_ID" \
            lzcomplexity_${VERSION}-${REVISION}~${{matrix.platform}}.1_source.changes

          # Clean up
          rm -f /tmp/passphrase.txt

          # Verify signatures
          echo "Verifying .changes signature:"
          gpg --verify lzcomplexity_${VERSION}-${REVISION}~${{matrix.platform}}.1_source.changes
          echo "Verifying .dsc signature:"
          gpg --verify lzcomplexity_${VERSION}-${REVISION}~${{matrix.platform}}.1.dsc

      - name: Upload to PPA
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
          DISTRO: $(lsb_release -cs)
        run: |
          dput ppa:${LAUNCHPAD_PPA} lzcomplexity_${VERSION}-${REVISION}~${{matrix.platform}}.1_source.changes

      # - name: Publish to PPA
      #   uses: yuezk/publish-ppa-package@v2
      #   with:
      #     repository: ${{ secrets.LAUNCHPAD_PPA }}
      #     gpg_private_key: ${{ secrets.GPG_KEY_LANUCHPAD }}
      #     gpg_passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}
      #     tarball: "*.orig.tar.xz"
      #     deb_email: ${{ secrets.LAUNCHPAD_EMAIL }}
      #     deb_fullname: "Efren Aragon"
      #     debian_dir: "debian"
      #     series: ${{ matrix.distro }}

  build-mac:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            build_type: "Release"
            cxx: clang++
            cc: clang
            builtinTbb: ON
            # - runs-on: macos-latest
            #   build_type: "Release"
            #   cxx: clang++
            #   cc: clang
            #   builtinTbb: OFF
          # - runs-on: macos-latest-large
          #   build_type: "Release"
          #   cxx: clang++
          #   cc: clang
          #   builtinTbb: ON
            
    name: • ${{ matrix.runs-on }} • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
      
      - name: Install TBB
        if: matrix.builtinTbb == 'OFF'
        run: |
          brew update
          brew install tbb

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Configure cmake
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DLZ_DISTANCE=OFF -DLZ_PARALLEL_BACKEND=TBB -DBUILTIN_TBB=${{matrix.builtinTbb}} \
                -S ${{ github.workspace }}

      - name: Build
        run: |
          cd build
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config ${{ matrix.build_type }} -j$(nproc)
      
      - name: Packaging
        run: |
          cd build
          cpack

          cd  ${{ github.workspace }}/_packages
          STD_NAME="lzcomplexity-${VERSION}.pkg"
          for file in *.pkg; do
            mv "$file" "$STD_NAME"
            echo "Renamed package to: $STD_NAME"
          done

      - uses: actions/upload-artifact@v6
        with:
          # name: lzcomplexity-${{matrix.runs-on}}-${{matrix.cxx}}-package
          name: lzcomplexity-package
          path: ${{ github.workspace }}/_packages/*.pkg
          retention-days: 1

  deploy-homebrew:
    needs: build-mac
    # Only run on tags or manual dispatch
    if: ${{ (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || inputs.mac }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: lzcomplexity-package
          path: ./dist

      - name: Calculate SHA256
        id: sha
        run: |
          cd ./dist
          PKG_FILE=$(ls *.pkg | head -n 1)
          SHA=$(shasum -a 256 "$PKG_FILE" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Calculated SHA256: $SHA"
          echo "PKG_FILE=$PKG_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.pkg
          tag_name: 0.9.15
          name: Release 0.9.15
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Checkout Homebrew Tap
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: ./tap
        
      - name: Update Cask
        run: |
          cd ./tap
          CASK_FILE="Casks/lzcomplexity.rb"
          
          # Check if Cask file exists
          if [ ! -f "$CASK_FILE" ]; then
            echo "Error: Casks/lzcomplexity.rb not found in tap repository!"
            exit 1
          fi
          
          # Update version
          # Matches: version "0.0.0"
          sed -i.bak "s/version \"[^\"]*\"/version \"$VERSION\"/" "$CASK_FILE"
          
          # Update URL
          # Matches: url "https://.../v0.0.0/filename.pkg"
          sed -i.bak "s|url \"[^\"]*\"|url \"https://github.com/${{ github.repository }}/releases/download/${VERSION}/lzcomplexity-${VERSION}.pkg\"|" "$CASK_FILE"
          
          # Update SHA256
          # Matches: sha256 "0000..."
          sed -i.bak "s/sha256 \"[^\"]*\"/sha256 \"${{ steps.sha.outputs.sha256 }}\"/" "$CASK_FILE"

          # Update pkg stanza filename to match the new versioned filename
          # Matches: pkg "lzcomplexity-v0.0.0.pkg"
          sed -i.bak "s/pkg \"[^\"]*\"/pkg \"lzcomplexity-${VERSION}.pkg\"/" "$CASK_FILE"
          
          # Clean up backup files
          rm -f *.bak
      
      - name: Commit and Push to Tap
        run: |
          cd ./tap
          
          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the updated cask file
          git add Casks/lzcomplexity.rb
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Update lzcomplexity cask to ${VERSION}"
            
            # CRITICAL: Ensure the remote URL uses the token for authentication
            # This embeds the token in the HTTPS URL for push operations
            git remote set-url origin "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ secrets.HOMEBREW_TAP_REPO }}.git"
            
            # Push with explicit token authentication
            git push origin main
          else
            echo "No changes to commit"
          fi

  build-rpm:
    defaults:
      run:
        shell: bash
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            build_type: "Release"
            cxx: g++
            cc: gcc
            builtinTbb: ON

    name: • RPM • ${{ matrix.cxx }} • builtinTbb-${{ matrix.builtinTbb }} •
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set reusable strings
        id: build_path
        run: |
         echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Configure cmake
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}
        run: |
          cmake -B ${{ steps.build_path.outputs.build-output-dir }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -Dasan=OFF -DBUILD_PYTHON=OFF -DLZ_DISTANCE=OFF -DLZ_PARALLEL_BACKEND=TBB -DBUILTIN_TBB=${{matrix.builtinTbb}} \
                -S ${{ github.workspace }}
  
      - name: Build
        run: |
          cmake --build ${{ steps.build_path.outputs.build-output-dir }} --config ${{ matrix.build_type }} -j$(nproc)

      - name: Generate RPM package using CPack
        run: |
          cd build
          cpack -G RPM

      - uses: actions/upload-artifact@v6
        with:
          name: lzcomplexity-redhat-${{matrix.cxx}}-package
          path: ${{ github.workspace }}/_packages
          retention-days: 1

  # Windows cmake compile
  # msvc:
  #   name: • ${{ matrix.os }} • ${{ matrix.build_type }} • ${{ matrix.msvc }} •
