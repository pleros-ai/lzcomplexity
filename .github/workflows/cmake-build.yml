# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # codespell:
  #   runs-on: [ubuntu-20.04]
  #   timeout-minutes: 10
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Run scan
  #       run: |
  #         sudo apt update && sudo apt install -y codespell
  #         ${GITHUB_WORKSPACE}/.github/scripts/codespell.sh `pwd`

  build:
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-20.04
            arch: x64
            cxx: g++-10
            std: 20
            cmake: "3.5"

          - runs-on: macos-latest
            arch: x64
            cxx: clang++
            std: 20
            cmake: "3.7"

          - runs-on: macos-latest
            arch: arm64
            cxx: clang++
            std: 20
            cmake: "3.7"

          - runs-on: windows-2019
            arch: x64 # x86 compilers seem to be missing on 2019 image
            cxx: cl
            std: 20
            cmake: "3.5"

    name: • ${{ matrix.runs-on }} • ${{ matrix.arch }} • ${{ matrix.cxx }} •
    runs-on: ${{ matrix.runs-on }}
    concurrency:
      group: ci-${{ matrix.arch }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # An action for adding a specific version of CMake:
      #   https://github.com/jwlawson/actions-setup-cmake
      # - name: Setup CMake ${{ matrix.cmake }}
      #   uses: jwlawson/actions-setup-cmake@v1.14
      #   with:
      #     cmake-version: ${{ matrix.cmake }}

      # - name: Install TBB
      #   shell: bash
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get -qq install libtbb-dev

      - name: Patch TBB submodule
        run: patch -p0 -i patches/tbb.patch

      - name: Configure cmake
        run: |
          mkdir build && cd build
          CXX=${{ matrix.cxx }} cmake -DCMAKE_BUILD_TYPE=Release -Dasan=OFF -Dbinding_python=OFF -Dbuiltin_tbb=ON ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release
