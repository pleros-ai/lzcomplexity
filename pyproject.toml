[build-system]
requires = ["scikit-build-core", "setuptools"]
build-backend = "scikit_build_core.setuptools.build_meta"

[project]
name = "lzcomplexity"
version = "0.9.3"
description = "LempelZiv-76 complexity utilities as a library and also a standalone software"
authors = [
    { name = "Efren Aragon", email = "efrenaragon96@gmail.com" }
]
license = { file = "LICENSE" }
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.7"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Programming Language :: Python :: 3",
    "Programming Language :: C++",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Information Analysis"
]

[tool.scikit-build]
cmake.version = ">=3.5"
cmake.verbose = true
cmake.build-type = "Release"
cmake.args = ["-DLZ_ONLY_CORE=ON", "-DBUILD_PYTHON=ON", "-GUnix Makefiles"]
logging.level = "INFO"
wheel.expand-macos-universal-tags = true
# wheel.py-api = ["cp39", "cp310", "cp311", "cp312"]

[tool.scikit-build.cmake.define]
